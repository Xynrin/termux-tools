name: Build & Release

# 触发条件 / Trigger
# 推送 v*.*.* 形式的 tag 时构建并发布
# Build and publish when a v*.*.* tag is pushed
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            asset: xynrin-tui-aarch64-linux-android
          - target: armv7-linux-androideabi
            asset: xynrin-tui-armv7-linux-androideabi
          - target: x86_64-linux-android
            asset: xynrin-tui-x86_64-linux-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build release
        working-directory: xynrin-tui
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t ${{ matrix.target }} --platform 24 build --release

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp xynrin-tui/target/${{ matrix.target }}/release/xynrin-tui dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      # 从 CHANGELOG.md 抽取本版本说明（与本地 release.sh 共用同一脚本）
      # Extract this version's notes from CHANGELOG.md (shared with local release.sh)
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting notes for version: $VERSION"
          bash scripts/extract-changelog.sh "$VERSION" > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "ERROR: CHANGELOG.md has no section for $VERSION" >&2
            exit 1
          fi
          echo "----- Notes preview -----"
          head -20 release_notes.md
          echo "-------------------------"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_notes.md
          fail_on_unmatched_files: true
